<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樊彧的主页</title>
  <style>
    /* 页面整体样式 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    /* 标题样式 */
    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    }

    /* 简介段落 */
    p {
      font-size: 1.5rem;
      margin-top: 0;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
    }

    /* 按钮示例 */
    .btn {
      margin-top: 2rem;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      color: #5563DE;
      background-color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #f0f0f0;
      transform: scale(1.05);
    }

    /* 响应式调整 */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1.2rem;
      }
      .btn {
        padding: 0.6rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <h1>欢迎来到我的主页</h1>
  <p>北京建筑大学 · 电气工程及其自动化</p>

  <!-- 示例按钮，可以链接到项目或社交 -->
  <a href="#" class="btn">查看我的项目</a>
</body>
</html>
