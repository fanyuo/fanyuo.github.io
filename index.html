<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樊彧的主页</title>
  <style>
    /* 页面整体样式 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      text-align: center;
    }

    header {
      margin-top: 60px;
    }

    /* 头像样式 */
    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-bottom: 20px;
    }

    /* 标题和简介 */
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    }
    p {
      font-size: 1.5rem;
      margin-top: 0;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
    }

    /* 技能徽章 */
    .skills {
      margin: 30px 0;
    }
    .skills img {
      margin: 5px;
      height: 40px;
      vertical-align: middle;
    }

    /* 项目展示 */
    .projects {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .project-card {
      background-color: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      transition: transform 0.3s, background-color 0.3s;
    }
    .project-card:hover {
      transform: translateY(-5px);
      background-color: rgba(255,255,255,0.2);
    }
    .project-card a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    /* 社交链接 */
    .socials a {
      margin: 0 10px;
      color: #fff;
      font-size: 2rem;
      transition: transform 0.3s;
    }
    .socials a:hover {
      transform: scale(1.2);
    }

    /* 按钮 */
    .btn {
      margin-top: 20px;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      color: #5563DE;
      background-color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background-color: #f0f0f0;
      transform: scale(1.05);
    }

    /* 响应式 */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      p { font-size: 1.2rem; }
      .project-card { width: 80%; }
    }
  </style>
</head>
<body>
  <header>
    <!-- 头像 -->
    <img src="https://avatars.githubusercontent.com/u/你的头像ID" alt="Avatar" class="avatar">
    
    <!-- 标题与简介 -->
    <h1>樊彧</h1>
    <p>北京建筑大学 · 电气工程及其自动化 · 全栈开发 & 技术爱好者</p>
  </header>

  <!-- 技能徽章 -->
  <div class="skills">
    <img src="https://img.shields.io/badge/HTML5-E34F26?style=flat&logo=html5&logoColor=white" alt="HTML5">
    <img src="https://img.shields.io/badge/CSS3-1572B6?style=flat&logo=css3&logoColor=white" alt="CSS3">
    <img src="https://img.shields.io/badge/JavaScript-F7DF1E?style=flat&logo=javascript&logoColor=black" alt="JavaScript">
    <img src="https://img.shields.io/badge/Vue-35495E?style=flat&logo=vue.js&logoColor=4FC08D" alt="Vue">
  </div>

  <!-- 项目展示 -->
  <div class="projects">
    <div class="project-card">
      <h3><a href="https://github.com/fanyuovan/vite-demo" target="_blank">Vite Demo</a></h3>
      <p>Vue + Vite 项目示例，包含基础组件与布局。</p>
    </div>
    <div class="project-card">
      <h3><a href="https://github.com/fanyuovan/portfolio" target="_blank">Portfolio</a></h3>
      <p>个人作品集网站，展示项目和技能。</p>
    </div>
  </div>

  <!-- 社交链接 -->
  <div class="socials">
    <a href="https://github.com/fanyuovan" target="_blank">🐱</a>
    <a href="https://linkedin.com/in/你的LinkedIn" target="_blank">🔗</a>
    <a href="mailto:fanyuovan@outlook.com">✉️</a>
  </div>

  <!-- 查看更多项目按钮 -->
  <a href="https://github.com/fanyuovan" class="btn" target="_blank">查看我的更多项目</a>
</body>
</html>
